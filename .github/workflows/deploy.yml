name: Deploy testweb4 node to EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2 with Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="region=us-east-1" \
            -var="project_name=${{ secrets.PROJECT_NAME }}"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=${SERVER_IP}" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure EC2 and Deploy with Ansible
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Wait for EC2 SSH to be ready
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/deploy_key ubuntu@${SERVER_IP} "echo ok" 2>/dev/null; then
              echo "SSH is ready."
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Write Ansible playbook
        run: |
          mkdir -p ansible
          cat > ansible/playbook.yml << 'PLAYBOOK_EOF'
          ---
          - name: Deploy testweb4 node on EC2
            hosts: all
            become: yes
            vars:
              app_dir: /opt/app
              app_user: ubuntu
              node_version: "20"

            tasks:

              - name: Update apt cache
                apt:
                  update_cache: yes
                  cache_valid_time: 3600

              - name: Install system dependencies
                apt:
                  name:
                    - curl
                    - git
                    - nginx
                    - build-essential
                    - ca-certificates
                    - gnupg
                  state: present

              - name: Add NodeSource GPG key
                shell: |
                  curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
                args:
                  creates: /etc/apt/keyrings/nodesource.gpg

              - name: Add NodeSource repository for Node.js 20
                shell: |
                  echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
                args:
                  creates: /etc/apt/sources.list.d/nodesource.list

              - name: Install Node.js 20
                apt:
                  name: nodejs
                  state: present
                  update_cache: yes

              - name: Install PM2 globally
                npm:
                  name: pm2
                  global: yes
                  state: present

              - name: Install Java 21
                apt:
                  name: openjdk-21-jdk
                  state: present

              - name: Install Python 3.11 and pip
                apt:
                  name:
                    - python3.11
                    - python3.11-venv
                    - python3-pip
                  state: present

              - name: Install local database (postgres)
                shell: |
                  apt-get install -y postgresql
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Fix PostgreSQL SCRAM auth to md5
                shell: |
                  HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
                  sed -i 's/scram-sha-256/md5/g' "$HBA"
                  systemctl reload postgresql
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Create PostgreSQL database and user
                shell: |
                  sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name | default('') }}'" | grep -q 1 || \
                    sudo -u postgres psql -c "CREATE DATABASE {{ db_name | default('appdb') }};"
                  sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username | default('') }}'" | grep -q 1 || \
                    sudo -u postgres psql -c "CREATE USER {{ db_username | default('appuser') }} WITH ENCRYPTED PASSWORD '{{ db_password | default('') }}';"
                  sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name | default('appdb') }} TO {{ db_username | default('appuser') }};"
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Install MySQL
                shell: |
                  apt-get install -y mysql-server
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Configure MySQL database and user
                shell: |
                  mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name | default('appdb') }};"
                  mysql -e "CREATE USER IF NOT EXISTS '{{ db_username | default('appuser') }}'@'localhost' IDENTIFIED BY '{{ db_password | default('') }}';"
                  mysql -e "GRANT ALL ON {{ db_name | default('appdb') }}.* TO '{{ db_username | default('appuser') }}'@'localhost';"
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Install MongoDB
                shell: |
                  curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
                  echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" > /etc/apt/sources.list.d/mongodb-org-7.0.list
                  apt-get update -y
                  apt-get install -y mongodb-org
                  systemctl start mongod
                  systemctl enable mongod
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Initialize MongoDB database
                shell: |
                  mongosh --eval 'db.getSiblingDB("{{ db_name | default('appdb') }}").createCollection("init")'
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Ensure app directory exists
                file:
                  path: "{{ app_dir }}"
                  state: directory
                  owner: "{{ app_user }}"
                  group: "{{ app_user }}"
                  mode: "0755"

              - name: Sync application code
                synchronize:
                  src: "{{ playbook_dir }}/../"
                  dest: "{{ app_dir }}/"
                  rsync_opts:
                    - "--exclude=.git"
                    - "--exclude=node_modules"
                    - "--exclude=.github"
                    - "--exclude=terraform"
                    - "--exclude=ansible"
                    - "--delete"
                delegate_to: localhost

              - name: Set app directory ownership
                file:
                  path: "{{ app_dir }}"
                  state: directory
                  owner: "{{ app_user }}"
                  group: "{{ app_user }}"
                  recurse: yes

              - name: Write .env file
                shell: |
                  printf '' > {{ app_dir }}/.env
                  [ -n "{{ node_env_database_url | default('') }}" ] && echo "DATABASE_URL={{ node_env_database_url | default('') }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_mongo_uri | default('') }}" ] && echo "MONGO_URI={{ node_env_mongo_uri | default('') }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_host | default('') }}" ] && echo "DB_HOST={{ node_env_db_host | default('') }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_port | default('') }}" ] && echo "DB_PORT={{ node_env_db_port | default('') }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_name | default('') }}" ] && echo "DB_NAME={{ node_env_db_name | default('') }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_user | default('') }}" ] && echo "DB_USER={{ node_env_db_user | default('') }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_password | default('') }}" ] && echo "DB_PASSWORD={{ node_env_db_password | default('') }}" >> {{ app_dir }}/.env || true
                  echo "PORT=3000" >> {{ app_dir }}/.env
                  echo "HOST=0.0.0.0" >> {{ app_dir }}/.env
                args:
                  executable: /bin/bash

              - name: Set .env file ownership
                file:
                  path: "{{ app_dir }}/.env"
                  owner: "{{ app_user }}"
                  group: "{{ app_user }}"
                  mode: "0600"

              - name: Install npm dependencies
                shell: |
                  cd {{ app_dir }}
                  npm install --production
                become_user: "{{ app_user }}"

              - name: Run npm build if build script exists
                shell: |
                  cd {{ app_dir }}
                  if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1);" 2>/dev/null; then
                    npm run build
                  fi
                become_user: "{{ app_user }}"

              - name: Delete existing PM2 app
                shell: |
                  pm2 delete app 2>/dev/null || true
                become_user: "{{ app_user }}"

              - name: Start application with PM2
                shell: |
                  cd {{ app_dir }}
                  set -a
                  [ -f {{ app_dir }}/.env ] && . {{ app_dir }}/.env
                  export PORT=${PORT:-3000}
                  export HOST=${HOST:-0.0.0.0}
                  set +a
                  if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.start ? 0 : 1);" 2>/dev/null; then
                    pm2 start npm --name app -- start --update-env
                  elif [ -f {{ app_dir }}/server.js ]; then
                    pm2 start {{ app_dir }}/server.js --name app --update-env
                  elif [ -f {{ app_dir }}/index.js ]; then
                    pm2 start {{ app_dir }}/index.js --name app --update-env
                  elif [ -f {{ app_dir }}/app.js ]; then
                    pm2 start {{ app_dir }}/app.js --name app --update-env
                  else
                    echo "ERROR: No valid entrypoint found" >&2
                    exit 1
                  fi
                become_user: "{{ app_user }}"

              - name: Save PM2 process list
                shell: |
                  pm2 save
                become_user: "{{ app_user }}"

              - name: Setup PM2 startup systemd service
                shell: |
                  env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu
                args:
                  creates: /etc/systemd/system/pm2-ubuntu.service

              - name: Configure Nginx as reverse proxy
                copy:
                  dest: /etc/nginx/sites-available/app
                  content: |
                    server {
                        listen 80;
                        server_name _;

                        location / {
                            proxy_pass http://127.0.0.1:3000;
                            proxy_http_version 1.1;
                            proxy_set_header Upgrade $http_upgrade;
                            proxy_set_header Connection 'upgrade';
                            proxy_set_header Host $host;
                            proxy_set_header X-Real-IP $remote_addr;
                            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                            proxy_set_header X-Forwarded-Proto $scheme;
                            proxy_cache_bypass $http_upgrade;
                        }
                    }

              - name: Enable Nginx site
                file:
                  src: /etc/nginx/sites-available/app
                  dest: /etc/nginx/sites-enabled/app
                  state: link

              - name: Remove default Nginx site
                file:
                  path: /etc/nginx/sites-enabled/default
                  state: absent

              - name: Test Nginx configuration
                shell: nginx -t

              - name: Restart Nginx
                systemd:
                  name: nginx
                  state: restarted
                  enabled: yes

              - name: Wait for application to be ready
                wait_for:
                  host: 127.0.0.1
                  port: 3000
                  timeout: 120
                  delay: 10
                ignore_errors: yes
                register: app_wait

              - name: Print PM2 logs on failure
                shell: |
                  pm2 logs app --lines 100 --nostream || true
                when: app_wait.failed is defined and app_wait.failed
                become_user: "{{ app_user }}"

              - name: Fail if application did not start
                fail:
                  msg: "Application failed to start on port 3000. Check PM2 logs above."
                when: app_wait.failed is defined and app_wait.failed

              - name: Print server IP
                debug:
                  msg: "server_ip={{ ansible_host }}"
          PLAYBOOK_EOF

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          ansible-playbook ansible/playbook.yml \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key ~/.ssh/deploy_key \
            -e node_env_database_url='${{ secrets.DATABASE_URL }}' \
            -e node_env_mongo_uri='${{ secrets.MONGO_URI }}' \
            -e node_env_db_host='${{ secrets.DB_HOST }}' \
            -e node_env_db_port='${{ secrets.DB_PORT }}' \
            -e node_env_db_name='${{ secrets.DB_NAME }}' \
            -e node_env_db_user='${{ secrets.DB_USER }}' \
            -e node_env_db_password='${{ secrets.DB_PASSWORD }}' \
            -e install_db='${{ secrets.INSTALL_DB_ON_EC2 }}' \
            -e db_type='${{ secrets.DB_TYPE }}' \
            -e db_name='${{ secrets.DB_NAME }}' \
            -e db_username='${{ secrets.DB_USERNAME }}' \
            -e db_password='${{ secrets.DB_PASSWORD }}'

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Verify application health endpoint
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Verifying application at http://${SERVER_IP}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${SERVER_IP}/health" || echo "000")
            echo "Attempt $i: HTTP status ${STATUS}"
            if [ "${STATUS}" = "200" ]; then
              echo "Application is healthy!"
              echo "Deployment URL: http://${SERVER_IP}"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Application health check failed after all attempts."
          exit 1

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: always()
    steps:
      - name: Deployment success notification
        if: needs.verify.result == 'success'
        run: |
          echo "=========================================="
          echo "Deployment SUCCEEDED"
          echo "Project : testweb4"
          echo "App     : node"
          echo "Region  : us-east-1"
          echo "Server  : ${{ needs.provision.outputs.server_ip }}"
          echo "URL     : http://${{ needs.provision.outputs.server_ip }}"
          echo "Health  : http://${{ needs.provision.outputs.server_ip }}/health"
          echo "=========================================="

      - name: Deployment failure notification
        if: needs.verify.result != 'success'
        run: |
          echo "=========================================="
          echo "Deployment FAILED"
          echo "Project : testweb4"
          echo "App     : node"
          echo "Region  : us-east-1"
          echo "Server  : ${{ needs.provision.outputs.server_ip }}"
          echo "Please check the workflow logs for details."
          echo "=========================================="
          exit 1