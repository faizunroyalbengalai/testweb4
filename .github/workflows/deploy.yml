name: Deploy node to EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2 with Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="region=us-east-1" \
            -var="project_name=${{ secrets.PROJECT_NAME }}"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure EC2 with Ansible
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ansible
        run: pip install ansible

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Wait for SSH to be available
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Waiting for SSH on $SERVER_IP..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/deploy_key ubuntu@$SERVER_IP echo "SSH ready" 2>/dev/null; then
              echo "SSH is available"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10 seconds..."
            sleep 10
          done
          echo "SSH never became available"
          exit 1

      - name: Write Ansible playbook
        run: |
          mkdir -p ansible
          cat > ansible/playbook.yml << 'PLAYBOOK_EOF'
          ---
          - name: Deploy Node.js app to EC2
            hosts: all
            become: yes
            vars:
              app_dir: /opt/app
              app_user: ubuntu
              node_version: "20"

            tasks:
              - name: Update apt cache
                apt:
                  update_cache: yes
                  cache_valid_time: 3600

              - name: Install required packages
                apt:
                  name:
                    - curl
                    - git
                    - nginx
                    - build-essential
                  state: present

              - name: Install Node.js 20 via NodeSource
                shell: |
                  curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
                  apt-get install -y nodejs
                args:
                  creates: /usr/bin/node

              - name: Install PM2 globally
                npm:
                  name: pm2
                  global: yes
                  state: present

              - name: Install PostgreSQL
                apt:
                  name: postgresql
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Fix PostgreSQL SCRAM auth to md5
                shell: |
                  PG_HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
                  sed -i 's/scram-sha-256/md5/g' "$PG_HBA"
                  systemctl reload postgresql
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Create PostgreSQL database
                shell: |
                  sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Create PostgreSQL user
                shell: |
                  sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Grant PostgreSQL privileges
                shell: |
                  sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};" 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Install MySQL
                apt:
                  name: mysql-server
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Create MySQL database and user
                shell: |
                  mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
                  mysql -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
                  mysql -e "GRANT ALL ON {{ db_name }}.* TO '{{ db_username }}'@'localhost';"
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Install MongoDB prerequisites
                apt:
                  name:
                    - gnupg
                    - curl
                  state: present
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Install MongoDB
                shell: |
                  curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor
                  echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | tee /etc/apt/sources.list.d/mongodb-org-7.0.list
                  apt-get update
                  apt-get install -y mongodb-org
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Start and enable MongoDB
                systemd:
                  name: mongod
                  state: started
                  enabled: yes
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Initialize MongoDB database
                shell: |
                  mongosh --eval 'db.getSiblingDB("{{ db_name }}").createCollection("init")' 2>/dev/null || true
                when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

              - name: Create app directory
                file:
                  path: "{{ app_dir }}"
                  state: directory
                  owner: "{{ app_user }}"
                  group: "{{ app_user }}"
                  mode: '0755'

              - name: Sync application files
                synchronize:
                  src: "{{ playbook_dir }}/../"
                  dest: "{{ app_dir }}/"
                  delete: yes
                  rsync_opts:
                    - "--exclude=.git"
                    - "--exclude=node_modules"
                    - "--exclude=.github"
                    - "--exclude=terraform"
                    - "--exclude=ansible"
                    - "--exclude=*.log"
                become: no

              - name: Set app directory ownership
                file:
                  path: "{{ app_dir }}"
                  state: directory
                  owner: "{{ app_user }}"
                  group: "{{ app_user }}"
                  recurse: yes

              - name: Write .env file
                shell: |
                  printf '' > {{ app_dir }}/.env
                  [ -n "{{ node_env_database_url | default('') }}" ] && echo "DATABASE_URL={{ node_env_database_url }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_mongo_uri | default('') }}" ] && echo "MONGO_URI={{ node_env_mongo_uri }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_host | default('') }}" ] && echo "DB_HOST={{ node_env_db_host }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_port | default('') }}" ] && echo "DB_PORT={{ node_env_db_port }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_name | default('') }}" ] && echo "DB_NAME={{ node_env_db_name }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_user | default('') }}" ] && echo "DB_USER={{ node_env_db_user }}" >> {{ app_dir }}/.env || true
                  [ -n "{{ node_env_db_password | default('') }}" ] && echo "DB_PASSWORD={{ node_env_db_password }}" >> {{ app_dir }}/.env || true
                  echo "PORT=3000" >> {{ app_dir }}/.env
                  echo "HOST=0.0.0.0" >> {{ app_dir }}/.env
                  chown {{ app_user }}:{{ app_user }} {{ app_dir }}/.env
                  chmod 600 {{ app_dir }}/.env

              - name: Install npm dependencies
                shell: |
                  cd {{ app_dir }}
                  npm install --production
                become: yes
                become_user: "{{ app_user }}"

              - name: Run build if build script exists
                shell: |
                  cd {{ app_dir }}
                  if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)" 2>/dev/null; then
                    npm run build
                  fi
                become: yes
                become_user: "{{ app_user }}"

              - name: Stop existing PM2 app
                shell: |
                  pm2 delete app 2>/dev/null || true
                become: yes
                become_user: "{{ app_user }}"

              - name: Start app with PM2
                shell: |
                  set -a
                  [ -f {{ app_dir }}/.env ] && . {{ app_dir }}/.env
                  export PORT=${PORT:-3000}
                  export HOST=${HOST:-0.0.0.0}
                  set +a
                  cd {{ app_dir }}
                  if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.start ? 0 : 1)" 2>/dev/null; then
                    pm2 start npm --name app -- start --update-env
                  elif [ -f {{ app_dir }}/server.js ]; then
                    pm2 start {{ app_dir }}/server.js --name app --update-env
                  elif [ -f {{ app_dir }}/index.js ]; then
                    pm2 start {{ app_dir }}/index.js --name app --update-env
                  elif [ -f {{ app_dir }}/app.js ]; then
                    pm2 start {{ app_dir }}/app.js --name app --update-env
                  else
                    echo "ERROR: No valid entrypoint found"
                    exit 1
                  fi
                become: yes
                become_user: "{{ app_user }}"

              - name: Save PM2 process list
                shell: pm2 save
                become: yes
                become_user: "{{ app_user }}"

              - name: Setup PM2 startup systemd service
                shell: |
                  env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu
                args:
                  creates: /etc/systemd/system/pm2-ubuntu.service

              - name: Wait for app to be ready
                wait_for:
                  host: 127.0.0.1
                  port: 3000
                  timeout: 120
                  delay: 10
                ignore_errors: yes
                register: wait_result

              - name: Print PM2 logs on failure
                shell: pm2 logs app --lines 50 --nostream
                become: yes
                become_user: "{{ app_user }}"
                when: wait_result is failed

              - name: Fail if app did not start
                fail:
                  msg: "Application failed to start on port 3000. Check PM2 logs above."
                when: wait_result is failed

              - name: Configure Nginx
                copy:
                  dest: /etc/nginx/sites-available/app
                  content: |
                    server {
                        listen 80;
                        server_name _;

                        location / {
                            proxy_pass http://127.0.0.1:3000;
                            proxy_http_version 1.1;
                            proxy_set_header Upgrade $http_upgrade;
                            proxy_set_header Connection 'upgrade';
                            proxy_set_header Host $host;
                            proxy_set_header X-Real-IP $remote_addr;
                            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                            proxy_set_header X-Forwarded-Proto $scheme;
                            proxy_cache_bypass $http_upgrade;
                        }
                    }

              - name: Enable Nginx site
                file:
                  src: /etc/nginx/sites-available/app
                  dest: /etc/nginx/sites-enabled/app
                  state: link

              - name: Remove default Nginx site
                file:
                  path: /etc/nginx/sites-enabled/default
                  state: absent

              - name: Test Nginx configuration
                shell: nginx -t

              - name: Restart Nginx
                systemd:
                  name: nginx
                  state: restarted
                  enabled: yes

              - name: Print server IP
                debug:
                  msg: "server_ip={{ ansible_host }}"
          PLAYBOOK_EOF

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          ansible-playbook ansible/playbook.yml \
            -i "$SERVER_IP," \
            -u ubuntu \
            --private-key ~/.ssh/deploy_key \
            -e node_env_database_url='${{ secrets.DATABASE_URL }}' \
            -e node_env_mongo_uri='${{ secrets.MONGO_URI }}' \
            -e node_env_db_host='${{ secrets.DB_HOST }}' \
            -e node_env_db_port='${{ secrets.DB_PORT }}' \
            -e node_env_db_name='${{ secrets.DB_NAME }}' \
            -e node_env_db_user='${{ secrets.DB_USER }}' \
            -e node_env_db_password='${{ secrets.DB_PASSWORD }}' \
            -e install_db='${{ secrets.INSTALL_DB_ON_EC2 }}' \
            -e db_type='${{ secrets.DB_TYPE }}' \
            -e db_name='${{ secrets.DB_NAME }}' \
            -e db_username='${{ secrets.DB_USERNAME }}' \
            -e db_password='${{ secrets.DB_PASSWORD }}'

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Check health endpoint
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Verifying deployment at http://$SERVER_IP/health"
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://$SERVER_IP/health" 2>/dev/null || echo "000")
            echo "Attempt $i/12 — HTTP status: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after all attempts"
          exit 1

      - name: Print deployment URL
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Deployment successful!"
          echo "Application URL: http://$SERVER_IP"
          echo "Health URL: http://$SERVER_IP/health"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: always()
    steps:
      - name: Deployment success notification
        if: needs.verify.result == 'success'
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "========================================"
          echo "Deployment SUCCEEDED"
          echo "Project : testweb4"
          echo "App     : node"
          echo "Region  : us-east-1"
          echo "Server  : $SERVER_IP"
          echo "URL     : http://$SERVER_IP"
          echo "Health  : http://$SERVER_IP/health"
          echo "========================================"

      - name: Deployment failure notification
        if: needs.verify.result != 'success'
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "========================================"
          echo "Deployment FAILED"
          echo "Project : testweb4"
          echo "App     : node"
          echo "Region  : us-east-1"
          echo "Server  : $SERVER_IP"
          echo "========================================"
          exit 1