name: Deploy testweb4 node to EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2 with Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Import existing key pair if present
        working-directory: terraform
        run: |
          KEY_NAME="${{ secrets.PROJECT_NAME }}-node-key"
          if aws ec2 describe-key-pairs --key-names "${KEY_NAME}" 2>/dev/null; then
            terraform import \
              -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
              -var="region=us-east-1" \
              -var="project_name=${{ secrets.PROJECT_NAME }}" \
              aws_key_pair.deployer "${KEY_NAME}" 2>/dev/null || true
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="region=us-east-1" \
            -var="project_name=${{ secrets.PROJECT_NAME }}"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=${SERVER_IP}" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure EC2 and Deploy with Ansible
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Wait for EC2 SSH to be ready
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/deploy_key ubuntu@${SERVER_IP} "echo ok" 2>/dev/null; then
              echo "SSH is ready."
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Write Ansible playbook
        run: |
          mkdir -p ansible
          cat > ansible/playbook.yml << 'PLAYBOOK_EOF'
          ---
          - name: Deploy testweb4 node on EC2
            hosts: all
            become: yes
            vars:
              app_dir: /opt/app
              app_user: ubuntu
              node_version: "20"

            tasks:

              - name: Update apt cache
                apt:
                  update_cache: yes
                  cache_valid_time: 3600

              - name: Install system dependencies
                apt:
                  name:
                    - curl
                    - git
                    - nginx
                    - build-essential
                    - ca-certificates
                    - gnupg
                  state: present

              - name: Add NodeSource GPG key
                shell: |
                  curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
                args:
                  creates: /etc/apt/keyrings/nodesource.gpg

              - name: Add NodeSource repository for Node.js 20
                shell: |
                  echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
                args:
                  creates: /etc/apt/sources.list.d/nodesource.list

              - name: Install Node.js 20
                apt:
                  name: nodejs
                  state: present
                  update_cache: yes

              - name: Install PM2 globally
                npm:
                  name: pm2
                  global: yes
                  state: present

              - name: Install Java 21
                apt:
                  name: openjdk-21-jdk
                  state: present

              - name: Install Python 3.11 and pip
                apt:
                  name:
                    - python3.11
                    - python3.11-venv
                    - python3-pip
                  state: present

              - name: Install local database (postgres)
                shell: |
                  apt-get install -y postgresql
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Fix PostgreSQL SCRAM auth to md5
                shell: |
                  HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
                  sed -i 's/scram-sha-256/md5/g' "$HBA"
                  systemctl reload postgresql
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Create PostgreSQL database and user
                shell: |
                  sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name | default('') }}'" | grep -q 1 || \
                    sudo -u postgres psql -c "CREATE DATABASE {{ db_name | default('appdb') }};"
                  sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username | default('') }}'" | grep -q 1 || \
                    sudo -u postgres psql -c "CREATE USER {{ db_username | default('appuser') }} WITH ENCRYPTED PASSWORD '{{ db_password | default('') }}';"
                  sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name | default('appdb') }} TO {{ db_username | default('appuser') }};"
                when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

              - name: Install MySQL
                shell: |
                  apt-get install -y mysql-server
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Configure MySQL database and user
                shell: |
                  mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name | default('appdb') }};"
                  mysql -e "CREATE USER IF NOT EXISTS '{{ db_username | default('appuser') }}'@'localhost' IDENTIFIED BY '{{ db_password | default('') }}';"
                  mysql -e "GRANT ALL ON {{ db_name | default('appdb') }}.* TO '{{ db_username | default('appuser') }}'@'localhost';"
                when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

              - name: Install MongoDB
                shell: |
                  curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
                  echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" > /etc/apt/sources.list.d/mongodb-org-7.0.list
                  apt-get update -y
                  apt-get install -y mongodb-org
                  systemctl start mongod
                  systemctl enable mongod
          PLAYBOOK_EOF